name = "Giveaway Master"
client_id = "d7617d613ba055cef18acc86d32d271c"
application_url = "https://your-app.vercel.app"
embedded = true

[access_scopes]
# Required scopes for reading customer data and orders
scopes = "read_customers,write_customers,read_orders"

[auth]
redirect_urls = [
  "https://your-app.vercel.app/auth/callback",
  "https://your-app.vercel.app/auth/shopify/callback",
  "https://your-app.vercel.app/api/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
